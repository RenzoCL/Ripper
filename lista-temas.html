<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar Temas — Ripper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{
            --red:#e50914;
            --red-2:#ff2432;
            --bg:#070707;
            --text:#f4f4f4;
            --muted:#b9b9b9;
            --line:rgba(255,255,255,.1);
            --card:#121212;
            --chip:#1c1c1c;
        }

        *{box-sizing:border-box;margin:0;padding:0}

        body{
            font-family:'Outfit',sans-serif;
            color:var(--text);
            background:var(--bg);
            min-height:100vh;
            overflow-x:hidden;
        }

        body::before{
            content:"";
            position:fixed;
            inset:0;
            z-index:-3;
            background:
                radial-gradient(1100px 600px at 80% 2%, rgba(229,9,20,.18), transparent 60%),
                linear-gradient(115deg, rgba(0,0,0,.9), rgba(0,0,0,.58) 48%, rgba(0,0,0,.9)),
                url('https://images.unsplash.com/photo-1516280440614-37939bbacd81?auto=format&fit=crop&w=2000&q=80') center/cover no-repeat;
            transform:scale(1.05);
            animation:slowZoom 24s ease-in-out infinite alternate;
        }

        body::after{
            content:"";
            position:fixed;
            inset:0;
            z-index:-2;
            background:radial-gradient(circle at center, transparent 38%, rgba(0,0,0,.74) 100%);
            pointer-events:none;
        }

        #lista-wrapper{
            width:min(1220px,94%);
            margin:0 auto;
            padding-bottom:28px;
        }

        .site-header{
            position:sticky;
            top:0;
            z-index:20;
            padding:18px 0 12px;
            background:linear-gradient(to bottom, rgba(0,0,0,.62), rgba(0,0,0,0));
            backdrop-filter:blur(8px);
        }

        .header-inner{
            display:grid;
            grid-template-columns:1fr auto 1fr;
            align-items:center;
            gap:12px;
        }

        .col-right{display:flex;justify-content:flex-end}

        .logo{
            text-decoration:none;
            color:var(--red);
            font-family:'Bebas Neue',sans-serif;
            font-size:3rem;
            letter-spacing:.16em;
            text-shadow:0 0 24px rgba(229,9,20,.4);
        }

        .btn-nav{
            display:inline-flex;
            align-items:center;
            gap:8px;
            text-decoration:none;
            color:#fff;
            border:1px solid rgba(255,255,255,.28);
            border-radius:999px;
            padding:9px 13px;
            font-size:.82rem;
            font-weight:600;
            background:rgba(0,0,0,.3);
            backdrop-filter:blur(6px);
            transition:.2s;
        }

        .btn-nav:hover{background:rgba(255,255,255,.1)}

        .btn-logout{
            cursor:pointer;
            border-color:rgba(255,255,255,.36);
        }

        .hero-mini{
            margin-top:4px;
            margin-bottom:12px;
            border:1px solid var(--line);
            border-radius:16px;
            background:
                linear-gradient(to right, rgba(0,0,0,.75), rgba(0,0,0,.45)),
                url('https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?auto=format&fit=crop&w=1800&q=80') center/cover no-repeat;
            box-shadow:0 20px 52px rgba(0,0,0,.52);
            overflow:hidden;
        }

        .hero-mini-content{
            padding:24px 24px;
            max-width:760px;
        }

        .hero-mini h1{
            font-size:clamp(1.8rem,4vw,3.2rem);
            line-height:.95;
            text-transform:uppercase;
        }

        .hero-mini p{
            margin-top:10px;
            color:#d5d5d5;
            line-height:1.5;
            max-width:60ch;
        }

        .chips{
            margin-top:15px;
            display:flex;
            flex-wrap:wrap;
            gap:8px;
        }

        .chip{
            font-size:.74rem;
            text-transform:uppercase;
            letter-spacing:.08em;
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.15);
            border-radius:999px;
            padding:7px 11px;
        }

        .buscador-wrap{
            position:sticky;
            top:84px;
            z-index:18;
            margin-bottom:12px;
        }

        .buscador{
            width:100%;
            height:50px;
            border-radius:12px;
            border:1px solid var(--line);
            background:rgba(10,10,10,.82);
            backdrop-filter:blur(10px);
            color:#fff;
            font-size:.97rem;
            padding:0 14px;
            outline:none;
            transition:border-color .2s, box-shadow .2s;
            box-shadow:0 12px 26px rgba(0,0,0,.38);
        }

        .buscador::placeholder{color:#9a9a9a}

        .buscador:focus{
            border-color:rgba(229,9,20,.8);
            box-shadow:0 0 0 4px rgba(229,9,20,.15), 0 12px 26px rgba(0,0,0,.38);
        }

        .container{margin-top:2px}

        .grid-huaynos{
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
            gap:14px;
        }

        .card.tema-card{
            --tone:229,9,20;
            text-decoration:none;
            color:#fff;
            border:1px solid rgba(var(--tone), .34);
            border-radius:14px;
            background:linear-gradient(160deg, rgba(28,28,28,.92), rgba(14,14,14,.94));
            min-height:156px;
            padding:14px 14px 12px;
            display:flex;
            flex-direction:column;
            justify-content:space-between;
            position:relative;
            overflow:hidden;
            transition:transform .2s ease, border-color .2s ease, box-shadow .2s ease;
        }

        .card.tema-card::before{
            content:"";
            position:absolute;
            inset:0;
            background:linear-gradient(140deg, rgba(var(--tone), .2), transparent 45%, rgba(255,255,255,.04));
            opacity:.55;
            pointer-events:none;
        }

        .card.tema-card::after{
            content:"";
            position:absolute;
            left:0;
            top:0;
            bottom:0;
            width:4px;
            background:rgba(var(--tone), .95);
            box-shadow:0 0 16px rgba(var(--tone), .55);
            pointer-events:none;
        }

        .card.tema-card:hover{
            transform:translateY(-4px) scale(1.015);
            border-color:rgba(var(--tone), .72);
            box-shadow:0 16px 30px rgba(0,0,0,.38), 0 0 0 1px rgba(var(--tone), .18) inset;
        }

        .titulo{
            display:block;
            font-size:1rem;
            font-weight:700;
            line-height:1.3;
            margin-bottom:7px;
        }

        .artista-sub{
            font-size:.88rem;
            color:#c7c7c7;
            line-height:1.35;
        }

        .tono-tag{
            align-self:flex-start;
            margin-top:12px;
            font-size:.75rem;
            font-weight:700;
            letter-spacing:.06em;
            text-transform:uppercase;
            color:#fff;
            border:1px solid rgba(var(--tone), .5);
            background:linear-gradient(180deg, rgba(var(--tone), .24), rgba(var(--tone), .12));
            border-radius:999px;
            padding:6px 10px;
        }

        .card.tema-card.modo-menor .tono-tag{
            border-style:dashed;
            color:#f0f0f0;
            background:linear-gradient(180deg, rgba(var(--tone), .18), rgba(0,0,0,.28));
        }

        .card.tema-card.tone-do{--tone:229,9,20}
        .card.tema-card.tone-re{--tone:255,123,0}
        .card.tema-card.tone-mi{--tone:255,196,0}
        .card.tema-card.tone-fa{--tone:33,198,131}
        .card.tema-card.tone-sol{--tone:22,163,255}
        .card.tema-card.tone-la{--tone:112,86,255}
        .card.tema-card.tone-si{--tone:228,79,227}

        .state-msg{
            grid-column:1/-1;
            text-align:center;
            border:1px dashed rgba(255,255,255,.2);
            border-radius:12px;
            padding:28px 12px;
            color:#b2b2b2;
            background:rgba(8,8,8,.5);
        }

        .state-msg.error{
            color:#ffd8d8;
            border-color:rgba(255,110,110,.4);
            background:rgba(255,76,76,.12);
        }

        @media (max-width: 760px){
            .header-inner{grid-template-columns:auto 1fr auto}
            .logo{font-size:2.2rem}
            .hero-mini-content{padding:18px 16px}
            .hero-mini h1{font-size:2rem}
            .buscador-wrap{top:74px}
        }

        @keyframes slowZoom{
            from{transform:scale(1.05)}
            to{transform:scale(1.1)}
        }
    </style>
</head>
<body>
    <div id="lista-wrapper">

        <header class="site-header">
            <div class="header-inner">
                <div class="col-left">
                    <a href="home.html" class="btn-nav">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                        <span>Volver</span>
                    </a>
                </div>
                <div class="col-mid">
                    <a href="home.html" class="logo">RIPPER</a>
                </div>
                <div class="col-right">
                    <button id="btnLogOut" class="btn-nav btn-logout">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                        <span>Cerrar Sesión</span>
                    </button>
                </div>
            </div>
        </header>

        <section class="hero-mini">
            <div class="hero-mini-content">
                <h1>Explora tus temas</h1>
                <p>Filtra por nombre o artista y abre cada tema en el reproductor con una experiencia visual consistente y elegante.</p>
                <div class="chips">
                    <span class="chip">Catálogo premium</span>
                    <span class="chip">Orden tonal</span>
                    <span class="chip">Acceso rápido</span>
                </div>
            </div>
        </section>

        <div class="buscador-wrap">
            <input type="text" id="buscador" class="buscador" placeholder="🔎 Buscar por título o artista...">
        </div>

        <div class="container">
            <div id="lista" class="grid-huaynos"></div>
        </div>

    </div>

    <script type="module">
        import { auth, db } from "./firebase.js";
        import { vigilarSesion, globalLogout } from "./js/seguridad.js";
        import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        vigilarSesion(auth, db, "lista-wrapper");
        document.getElementById("btnLogOut").onclick = () => globalLogout(auth);

        const params    = new URLSearchParams(window.location.search);
        const catActual = params.get('cat') || 'huayno';
        const listaDiv  = document.getElementById("lista");
        const buscador  = document.getElementById("buscador");

        const normalizar = t => t ? t.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase() : "";
        const ORDEN_NOTAS = { do:1, re:2, mi:3, fa:4, sol:5, la:6, si:7 };

        let temasCache = [];

        async function cargarTemas() {
            listaDiv.innerHTML = `<p class="state-msg">Cargando...</p>`;
            try {
                const snap = await getDocs(query(collection(db, "temas"), where("categoria","==",catActual)));
                temasCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderFiltrado();
            } catch(e) {
                console.error(e);
                listaDiv.innerHTML = `<p class="state-msg error">Error de conexión.</p>`;
            }
        }

        function renderFiltrado(filtro = "") {
            const txt = normalizar(filtro);
            const lista = temasCache
                .filter(t => normalizar(t.titulo).includes(txt) || normalizar(t.artista).includes(txt))
                .sort((a, b) => {
                    const nA = (a.tonalidad||"").toLowerCase().split(" ")[0];
                    const nB = (b.tonalidad||"").toLowerCase().split(" ")[0];
                    const mA = (a.tonalidad||"").toLowerCase().includes("menor") ? 1 : 0;
                    const mB = (b.tonalidad||"").toLowerCase().includes("menor") ? 1 : 0;
                    const d  = (ORDEN_NOTAS[nA]||99) - (ORDEN_NOTAS[nB]||99);
                    if (d !== 0) return d;
                    if (mA !== mB) return mA - mB;
                    return (a.titulo||"").localeCompare(b.titulo||"");
                });

            if (!lista.length) {
                listaDiv.innerHTML = `<p class="state-msg">Sin resultados.</p>`;
                return;
            }
            listaDiv.innerHTML = "";
            lista.forEach(t => {
                const a = document.createElement("a");
                a.href = `reproductor.html?id=${t.id}&cat=${catActual}`;
                const tonalidadRaw = normalizar(t.tonalidad || "");
                const notaBase = tonalidadRaw.split(" ")[0] || "";
                const claseNota = ["do", "re", "mi", "fa", "sol", "la", "si"].includes(notaBase) ? `tone-${notaBase}` : "";
                const claseModo = tonalidadRaw.includes("menor") ? "modo-menor" : tonalidadRaw.includes("mayor") ? "modo-mayor" : "";
                a.className = `card tema-card ${claseNota} ${claseModo}`.trim();
                a.innerHTML = `
                    <div>
                        <span class="titulo">${t.titulo||"Sin título"}</span>
                        <div class="artista-sub">${t.artista||"Artista"}</div>
                    </div>
                    <span class="tono-tag">${t.tonalidad||"--"}</span>`;
                listaDiv.appendChild(a);
            });
        }

        buscador.addEventListener("input", e => renderFiltrado(e.target.value));
        cargarTemas();
    </script>
</body>
</html>
