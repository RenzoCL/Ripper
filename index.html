<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="imagenes/favicon.png" type="image/png">
    <style>
        :root{
            --red:#e50914;
            --red-2:#ff2432;
            --bg:#080808;
            --text:#f4f4f4;
            --muted:#b8b8b8;
            --card:rgba(20,20,20,.72);
            --line:rgba(255,255,255,.13);
            --ok:#25D366;
        }

        *{box-sizing:border-box;margin:0;padding:0}
        body{
            font-family:'Outfit',sans-serif;
            background:var(--bg);
            color:var(--text);
            min-height:100vh;
            overflow-x:hidden;
        }

        body::before{
            content:"";
            position:fixed;
            inset:0;
            z-index:-3;
            background:
                radial-gradient(1000px 500px at 85% 5%, rgba(229,9,20,.2), transparent 60%),
                linear-gradient(115deg, rgba(0,0,0,.9), rgba(0,0,0,.56) 48%, rgba(0,0,0,.9)),
                url("https://images.unsplash.com/photo-1440404653325-ab127d49abc1?auto=format&fit=crop&w=2000&q=80") center/cover no-repeat;
            transform:scale(1.05);
            animation:slowZoom 22s ease-in-out infinite alternate;
        }

        body::after{
            content:"";
            position:fixed;
            inset:0;
            z-index:-2;
            background:radial-gradient(circle at center, transparent 36%, rgba(0,0,0,.72) 100%);
            pointer-events:none;
        }

        .site-header{
            width:min(1200px, 94%);
            margin:0 auto;
            padding:20px 0 12px;
        }

        .header-inner{
            display:grid;
            grid-template-columns:1fr auto 1fr;
            align-items:center;
        }

        .col-right{display:flex;justify-content:flex-end}

        .logo{
            text-decoration:none;
            font-family:'Bebas Neue',sans-serif;
            color:var(--red);
            font-size:3rem;
            letter-spacing:.16em;
            text-shadow:0 0 24px rgba(229,9,20,.4);
        }

        .btn-nav{
            text-decoration:none;
            color:#fff;
            border:1px solid rgba(255,255,255,.35);
            border-radius:999px;
            padding:9px 14px;
            font-size:.84rem;
            font-weight:600;
            background:rgba(0,0,0,.25);
            backdrop-filter:blur(8px);
            transition:.2s;
        }
        .btn-nav:hover{background:rgba(255,255,255,.08)}

        .hero{
            width:min(1200px, 94%);
            margin:0 auto;
            padding:24px 0 10px;
        }

        .hero-content{
            display:grid;
            grid-template-columns:1.15fr .85fr;
            gap:28px;
            align-items:center;
        }

        .hero-left h1{
            font-size:clamp(2.2rem,5vw,4.4rem);
            text-transform:uppercase;
            line-height:.95;
            max-width:14ch;
            text-wrap:balance;
        }

        .hero-left p{
            margin-top:14px;
            color:#d4d4d4;
            font-size:1.02rem;
            max-width:50ch;
            line-height:1.55;
        }

        .hero-ctas{margin-top:22px}

        .btn{
            display:inline-flex;
            align-items:center;
            gap:10px;
            border:none;
            text-decoration:none;
            border-radius:10px;
            padding:12px 20px;
            font-weight:800;
            letter-spacing:.06em;
            text-transform:uppercase;
        }

        .btn-primary{
            color:#fff;
            background:linear-gradient(180deg,var(--red-2),var(--red));
            box-shadow:0 14px 35px rgba(229,9,20,.35);
            transition:filter .2s ease, transform .06s ease;
        }
        .btn-primary:hover{filter:brightness(1.08)}
        .btn-primary:active{transform:translateY(1px)}

        .login-panel{
            background:var(--card);
            border:1px solid var(--line);
            border-radius:16px;
            padding:24px 22px;
            backdrop-filter:blur(12px);
            box-shadow:0 22px 60px rgba(0,0,0,.55);
            position:relative;
            overflow:hidden;
        }

        .login-panel::before{
            content:"";
            position:absolute;
            inset:-120% -30%;
            background:conic-gradient(from 180deg, transparent, rgba(229,9,20,.22), transparent 35%);
            animation:sweep 8s linear infinite;
            pointer-events:none;
        }

        .login-panel h2{font-size:1.8rem;margin-bottom:10px;position:relative}

        .error-text{
            display:none;
            margin-bottom:10px;
            color:#ffd7d7;
            border:1px solid rgba(255,110,110,.4);
            border-radius:8px;
            background:rgba(255,80,80,.12);
            padding:9px 11px;
            font-size:.85rem;
            position:relative;
        }

        .login-panel label{
            display:block;
            margin:10px 0 7px;
            font-size:.76rem;
            color:#d2d2d2;
            text-transform:uppercase;
            letter-spacing:.08em;
        }

        .login-input{
            width:100%;
            height:46px;
            border-radius:10px;
            border:1px solid rgba(255,255,255,.14);
            padding:0 12px;
            background:rgba(0,0,0,.42);
            color:#fff;
            outline:none;
            transition:border-color .2s, box-shadow .2s;
            position:relative;
        }

        .login-input:focus{
            border-color:rgba(229,9,20,.8);
            box-shadow:0 0 0 4px rgba(229,9,20,.16);
        }

        .btn-login{
            margin-top:14px;
            width:100%;
            height:46px;
            border-radius:10px;
            border:none;
            font-weight:800;
            letter-spacing:.08em;
            color:#fff;
            background:linear-gradient(180deg,var(--red-2),var(--red));
            box-shadow:0 12px 28px rgba(229,9,20,.36);
            cursor:pointer;
            transition:.2s;
            position:relative;
            overflow:hidden;
        }

        .btn-login::before{
            content:"";
            position:absolute;
            top:0;
            left:-30%;
            width:30%;
            height:100%;
            background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
            transform:skewX(-20deg);
            transition:left .5s ease;
        }
        .btn-login:hover::before{left:120%}
        .btn-login:hover{filter:brightness(1.08)}

        .whatsapp-section{
            border-top:1px solid rgba(255,255,255,.1);
            margin-top:14px;
            padding-top:12px;
            text-align:center;
        }

        .whatsapp-text{color:#a8a8a8;font-size:.84rem}

        .btn-whatsapp{
            display:inline-flex;
            margin-top:10px;
            align-items:center;
            gap:8px;
            text-decoration:none;
            color:#fff;
            background:var(--ok);
            border-radius:999px;
            padding:10px 16px;
            font-weight:700;
            box-shadow:0 10px 24px rgba(37,211,102,.3);
        }

        .site-main{
            width:min(1200px, 94%);
            margin:2px auto 32px;
            display:grid;
            gap:18px;
        }

        .row{
            background:linear-gradient(180deg, rgba(20,20,20,.5), rgba(10,10,10,.5));
            border:1px solid rgba(255,255,255,.08);
            border-radius:14px;
            padding:14px;
            backdrop-filter:blur(4px);
        }

        .row-title{
            font-size:1rem;
            margin-bottom:10px;
            letter-spacing:.05em;
            text-transform:uppercase;
            color:#e5e5e5;
        }

        .carousel{position:relative}

        .row-cards{
            display:grid;
            grid-auto-flow:column;
            grid-auto-columns:minmax(180px, 1fr);
            gap:14px;
            overflow:auto;
            scrollbar-width:none;
            scroll-behavior:smooth;
            padding-bottom:2px;
        }
        .row-cards::-webkit-scrollbar{display:none}

        .card{
            text-decoration:none;
            color:#fff;
            border-radius:12px;
            overflow:hidden;
            background:#121212;
            border:1px solid rgba(255,255,255,.08);
            transition:transform .2s ease, border-color .2s ease;
        }
        .card:hover{
            transform:translateY(-4px) scale(1.02);
            border-color:rgba(229,9,20,.5);
        }

        .poster{
            height:170px;
            background:linear-gradient(135deg,#2f2f2f,#111);
            position:relative;
        }

        .poster::after{
            content:"";
            position:absolute;
            inset:0;
            background:linear-gradient(to top, rgba(0,0,0,.65), transparent 45%);
        }

        .card:nth-child(1) .poster{background:url('imagenes/huayno.webp') center/cover no-repeat}
        .card:nth-child(2) .poster{background:url('https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?auto=format&fit=crop&w=1000&q=80') center/cover no-repeat}
        .card:nth-child(3) .poster{background:url('https://images.unsplash.com/photo-1516280440614-37939bbacd81?auto=format&fit=crop&w=1000&q=80') center/cover no-repeat}
        .card:nth-child(4) .poster{background:url('https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?auto=format&fit=crop&w=1000&q=80') center/cover no-repeat}
        .card:nth-child(5) .poster{background:url('https://images.unsplash.com/photo-1511379938547-c1f69419868d?auto=format&fit=crop&w=1000&q=80') center/cover no-repeat}

        .carousel-btn{
            position:absolute;
            top:50%;
            transform:translateY(-50%);
            z-index:2;
            border:none;
            width:34px;
            height:34px;
            border-radius:999px;
            background:rgba(0,0,0,.58);
            color:#fff;
            cursor:pointer;
            backdrop-filter:blur(6px);
        }
        .carousel-btn.prev{left:-8px}
        .carousel-btn.next{right:-8px}

        .scroll-fade{
            position:absolute;
            top:0;
            bottom:0;
            width:38px;
            pointer-events:none;
            z-index:1;
        }
        .scroll-fade.left{left:0;background:linear-gradient(90deg, rgba(0,0,0,.55), transparent)}
        .scroll-fade.right{right:0;background:linear-gradient(270deg, rgba(0,0,0,.55), transparent)}

        .site-footer{
            text-align:center;
            color:#707070;
            font-size:.78rem;
            letter-spacing:.08em;
            margin:6px 0 20px;
        }
        .muted{color:#9a9a9a}

        @media (max-width: 980px){
            .hero-content{grid-template-columns:1fr}
        }

        @media (max-width: 560px){
            .header-inner{grid-template-columns:auto 1fr auto}
            .logo{font-size:2.2rem}
            .hero-left h1{font-size:2rem}
            .carousel-btn{display:none}
            .poster{height:145px}
        }

        @keyframes sweep{
            from{transform:rotate(0deg)}
            to{transform:rotate(360deg)}
        }

        @keyframes slowZoom{
            from{transform:scale(1.05)}
            to{transform:scale(1.1)}
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-inner">
            <div class="col-left"></div>
            <div class="col-mid">
                <a href="index.html" class="logo">RIPPER</a>
            </div>
            <div class="col-right">
                <a href="login.html" class="btn-nav">Iniciar sesión</a>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <div class="hero-left">
                <h1>Huaynos — Estilo Huaraz</h1>
                <p>Escucha los huaynos mientras miras la partitura con una experiencia visual inspirada en plataformas de streaming.</p>
                <div class="hero-ctas">
                    <a class="btn btn-primary" href="login.html"><i class="fa-solid fa-play"></i> Comenzar</a>
                </div>
            </div>

            <aside class="login-panel" id="login-panel">
                <h2>Ingresa</h2>
                <div id="error-msg" class="error-text"></div>
                <label>Correo</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" class="login-input">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" class="login-input">
                <button id="btnLogin" class="btn-login">ENTRAR</button>
                <div class="whatsapp-section">
                    <p class="whatsapp-text">¿No tienes cuenta? Contáctame por WhatsApp</p>
                    <a href="https://wa.me/51933287274" target="_blank" class="btn-whatsapp" rel="noopener noreferrer">
                        <i class="fab fa-whatsapp"></i> WhatsApp
                    </a>
                </div>
            </aside>
        </div>
    </section>

    <main class="site-main">
        <section class="row">
            <h3 class="row-title">Recomendados</h3>
            <div class="carousel">
                <button class="carousel-btn prev">◀</button>
                <div class="row-cards" data-carousel>
                    <div class="card"><div class="poster"></div></div>
                    <div class="card"><div class="poster"></div></div>
                    <div class="card"><div class="poster"></div></div>
                    <div class="card"><div class="poster"></div></div>
                    <div class="card"><div class="poster"></div></div>
                </div>
                <button class="carousel-btn next">▶</button>
                <div class="scroll-fade left"></div><div class="scroll-fade right"></div>
            </div>
        </section>

        <section class="row">
            <h3 class="row-title">Nuevos</h3>
            <div class="carousel">
                <button class="carousel-btn prev">◀</button>
                <div class="row-cards" data-carousel>
                    <div class="card"><div class="poster"></div></div>
                    <div class="card"><div class="poster"></div></div>
                    <div class="card"><div class="poster"></div></div>
                </div>
                <button class="carousel-btn next">▶</button>
                <div class="scroll-fade left"></div><div class="scroll-fade right"></div>
            </div>
        </section>
    </main>

    <footer class="site-footer">HECHO POR <span class="muted">RENZO CHAVARRIA</span></footer>

    <script type="module">
        import { auth, db } from "./firebase.js"; // Añade db aquí
        import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { reclamarSesion } from "./js/seguridad.js"; // Añade esta línea

        const btnLogin = document.getElementById("btnLogin");
        const errorMsg = document.getElementById("error-msg");

        onAuthStateChanged(auth, async (user) => { 
            if (user) {
                // Antes de mandarlo a home, nos aseguramos de que este 
                // navegador sea el "dueño" actual de la sesión.
                try {
                    await reclamarSesion(db, user.uid);
                    window.location.replace("home.html");
                } catch (e) {
                    console.error("Error al reclamar sesión automática:", e);
                    // Si hay error (ej. reglas de Firestore), igual lo mandamos
                    window.location.replace("home.html");
                }
            }
        });

        btnLogin.onclick = async () => {
            const email = document.getElementById("email").value;
            const pass  = document.getElementById("password").value;
            if (!email || !pass) return;
            
            btnLogin.textContent = "VERIFICANDO...";
            errorMsg.style.display = "none";
            
            try {
                // 1. Iniciar sesión
                const cred = await signInWithEmailAndPassword(auth, email, pass);
                
                // 2. ACTUALIZAR DISPOSITIVO (Crucial para la expulsión)
                await reclamarSesion(db, cred.user.uid);
                
                // 3. Redirigir
                window.location.replace("home.html");
            } catch (e) {
                btnLogin.textContent = "ENTRAR";
                errorMsg.style.display = "block";
                errorMsg.textContent = "Acceso denegado. Verifica tus datos.";
            }
        };
        // Función para detectar la tecla ENTER
        const inputs = [document.getElementById("email"), document.getElementById("password")];

        inputs.forEach(input => {
            input.addEventListener("keypress", (event) => {
                if (event.key === "Enter") {
                    event.preventDefault(); // Evita que la página se recargue
                    btnLogin.click();       // Ejecuta la misma lógica del botón entrar
                }
            });
        });
    </script>
</body>
</html>
